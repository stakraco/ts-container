# =============================================================================
# Composite Action — Setup Node + pnpm + install
#
# Reused by every job in CI and publish workflows to eliminate duplication.
# Handles: pnpm setup → Node.js setup with cache → dependency install.
# =============================================================================

name: Setup
description: Setup Node.js, pnpm, and install dependencies

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.33.0

    - name: 🟢 Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: 📥 Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
