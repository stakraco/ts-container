<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3178c6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="24"/>

  <!-- Glow -->
  <circle cx="100" cy="100" r="80" fill="#3178c6" opacity="0.07" filter="url(#glow)"/>

  <!-- Icon: nested boxes DI symbol -->
  <g transform="translate(40, 40)" filter="url(#glow)">
    <!-- Outer box -->
    <rect x="0" y="0" width="120" height="120" rx="14" fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.9"/>
    <!-- Middle box -->
    <rect x="20" y="20" width="80" height="80" rx="10" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity="0.65"/>
    <!-- Inner fill -->
    <rect x="40" y="40" width="40" height="40" rx="6" fill="url(#iconGrad)" opacity="0.2"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="12" fill="url(#iconGrad)" opacity="1"/>
    <!-- Connector lines -->
    <line x1="60" y1="0" x2="60" y2="40" stroke="url(#iconGrad)" stroke-width="2" opacity="0.45"/>
    <line x1="60" y1="80" x2="60" y2="120" stroke="url(#iconGrad)" stroke-width="2" opacity="0.45"/>
    <line x1="0" y1="60" x2="40" y2="60" stroke="url(#iconGrad)" stroke-width="2" opacity="0.45"/>
    <line x1="80" y1="60" x2="120" y2="60" stroke="url(#iconGrad)" stroke-width="2" opacity="0.45"/>
  </g>
</svg>
