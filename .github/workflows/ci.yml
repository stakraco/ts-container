# =============================================================================
# CI — @stakra/ts-container
#
# Runs on every push to main/develop and on pull requests targeting those
# branches. Jobs run in parallel where possible; test waits for build.
#
# Job graph:
#   typecheck ─┐
#   build ─────┼─► test
#   lint ──────┘
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Type check
  # ---------------------------------------------------------------------------
  typecheck:
    name: 🔷 Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: 🔷 tsc --noEmit
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Build — matrix across supported Node versions
  # ---------------------------------------------------------------------------
  build:
    name: 🔨 Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: 🔨 Build
        run: pnpm build
      - name: 📤 Upload dist
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Test — runs after build succeeds on Node 22
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: 🧪 vitest run
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Format check — non-blocking advisory (prettier)
  # ---------------------------------------------------------------------------
  format:
    name: 🎨 Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: 🎨 prettier --check
        run: pnpm format:check

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: 🔍 eslint
        run: pnpm lint
